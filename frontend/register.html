<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - ACS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h1 class="main-title">Academic Collaboration System</h1>
        <p class="sub-title">Create New Account</p>
        
        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="password" id="regPass" placeholder="Create Password">
        
        <button class="btn-register-vibrant" onclick="handleRegister()">REGISTER NOW</button>
        <p style="margin-top:15px;">Already have an account? <a href="login.html">Login here</a></p>
        <p id="regMsg"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
